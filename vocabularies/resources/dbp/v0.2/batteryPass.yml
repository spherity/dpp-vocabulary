    comment: |
      E-mail address of supplier for spare parts.

  - id: supplierWebAddress
    label: supplier web address
    domain: bp:SparePartSupplier
    range: xsd:anyURI
    comment: |
      Web address of supplier for spare parts.

  - id: addressOfSupplier
