    domain: bp:SparePartSupplier
    range: bp:PostalAddress
    comment: |
      Postal address of supplier for spare parts.

  - id: components
    label: components
    domain: bp:SparePartSupplier
    range: bp:Component
    comment: |
      Components available at supplier.

