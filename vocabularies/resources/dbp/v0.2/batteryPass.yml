    comment: |
      Name of the component part.

  - id: partNumber
    label: part number
    domain: bp:Component
    range: xsd:string
    comment: |
      Part number of component.

  # -----------------------------------------------------------------------
  # RecycledContent properties
  # -----------------------------------------------------------------------
  - id: recycledMaterial
    label: recycled material
    domain: bp:RecycledContent
    range: bp:RecycledMaterialDatatype
    comment: |
      Name of recycled material.

  - id: preConsumerShare
    label: pre consumer share
    domain: bp:RecycledContent
    range: xsd:double
    comment: |
      Recycled material share from pre-consumer waste (manufacturing waste, excluding
      run-around scrap) of the active material.

  - id: postConsumerShare
    label: post consumer share
    domain: bp:RecycledContent
    range: xsd:double
    comment: |
      Recycled material share from post-consumer waste (end-of-life scrap)
      of the active material.

