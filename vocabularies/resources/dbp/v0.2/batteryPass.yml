      end-users in contributing to waste prevention.

  - id: separateCollection
    label: separate collection
    domain: bp:EndOfLifeInformation
    range: xsd:anyURI
    comment: |
      Prevention and management of waste batteries: Information on the role of
      end-users in contributing to the separate collection of waste batteries.

  - id: informationOnCollection
    label: information on collection
    domain: bp:EndOfLifeInformation
    range: xsd:anyURI
    comment: |
      Prevention and management of waste batteries: Information on the separate
      collection, the take back, the collection points.

  # -----------------------------------------------------------------------
  # PerformanceAndDurability properties
  # -----------------------------------------------------------------------
  - id: batteryTechnicalProperties
    label: battery technical properties
    domain: bp:PerformanceAndDurability
    range: bp:BatteryTechnicalProperties
    comment: |
      This property covers all performance related static properties.

  - id: batteryCondition
    label: battery condition
    domain: bp:PerformanceAndDurability
    range: bp:BatteryCondition
    comment: |
      Expected battery lifetime expressed in cycles, and reference test used.
      Expected lifetime under reference conditions for which they have been designed
      in terms of cycles and calendar years.

  # -----------------------------------------------------------------------
  # BatteryTechnicalProperties properties (static)
  # -----------------------------------------------------------------------
  - id: originalPowerCapability
    label: original power capability
    domain: bp:BatteryTechnicalProperties
    range: bp:PowerCapabilityAt
    comment: |
      Pre-use power capability: Definition of power capability as given in Battery
      Regulation. Annex IV Part B, point 4 - measurement at 80% and 20% SoC required.
      DIN DKE Spec 99100 chapter reference: 6.7.3.2

  - id: ratedMaximumPower
    label: rated maximum power
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Maximum permitted power the battery is rated for, reflecting power limits.
      DIN DKE Spec 99100 chapter reference: 6.7.3.5

  - id: ratedEnergy
    label: rated energy
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      The certified usable battery energy according to the procedure in the UN GTR No 22.
      DIN DKE Spec 99100 chapter reference: 6.7.2.5

  - id: expectedNumberOfCycles
    label: expected number of cycles
    domain: bp:BatteryTechnicalProperties
    range: xsd:integer
    comment: |
      Expected battery lifetime expressed in cycles.
      DIN DKE Spec 99100 chapter reference: 6.7.6.3

  - id: initialSelfDischarge
    label: initial self discharge
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Initial self-discharge in % of capacity per unit of time in defined conditions.
      DIN DKE Spec 99100 chapter reference: 6.7.4.6

  - id: roundtripEfficiency
    label: roundtrip efficiency
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Energy round trip efficiency is the ratio of net energy delivered during discharge
      to total energy required to restore initial state of charge.
      DIN DKE Spec 99100 chapter reference: 6.7.4.2

  - id: ratedCapacity
    label: rated capacity
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Rated capacity is the total number of ampere-hours (Ah) that can be withdrawn
      from a fully charged battery under reference conditions.
      DIN DKE Spec 99100 chapter reference: 6.7.2.2

  - id: initialInternalResistance
    label: initial internal resistance
    domain: bp:BatteryTechnicalProperties
    range: bp:InternalResistance
    comment: |
      Initial internal resistance on battery pack level.
      DIN DKE Spec 99100 chapter reference: 6.7.5.2

  - id: expectedLifetime
    label: expected lifetime
    domain: bp:BatteryTechnicalProperties
    range: xsd:integer
    comment: |
      Expected battery lifetime in calendar years.
      DIN DKE Spec 99100 chapter reference: 6.7.6.2

  - id: cRate
    label: c rate
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Ratio between nominal battery power in W and battery energy in Wh.
      DIN DKE Spec 99100 chapter reference: 6.7.3.6

  - id: cRateLifeCycleTest
    label: c rate life cycle test
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      C-rate for charge and discharge in cycle-life test.
      DIN DKE Spec 99100 chapter reference: 6.7.6.6

  - id: nominalVoltage
    label: nominal voltage
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Nominal voltage the battery is rated for.
      DIN DKE Spec 99100 chapter reference: 6.7.2.11

  - id: minimumVoltage
    label: minimum voltage
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Minimum voltage the battery is rated for.
      DIN DKE Spec 99100 chapter reference: 6.7.2.9

  - id: maximumVoltage
    label: maximum voltage
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Maximum voltage the battery is rated for.
      DIN DKE Spec 99100 chapter reference: 6.7.2.10

  - id: capacityThresholdForExhaustion
    label: capacity threshold for exhaustion
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Percentage of SOCE above which the battery is still considered operational.
      DIN DKE Spec 99100 chapter reference: 6.7.6.9

  - id: lifetimeReferenceTest
    label: lifetime reference test
    domain: bp:BatteryTechnicalProperties
    range: xsd:anyURI
    comment: |
      Reference test for lifetime measurements.
      DIN DKE Spec 99100 chapter reference: 6.7.6.5

  - id: temperatureRangeIdleState
    label: temperature range idle state
    domain: bp:BatteryTechnicalProperties
    range: bp:TemperatureRangeType
    comment: |
      Upper and lower boundary of temperature range the battery can safely withstand.
      DIN DKE Spec 99100 chapter reference: 6.7.6.3-4

  - id: capacityFade
    label: capacity fade
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Allowable capacity fade threshold as percentage of rated capacity, used to
      determine end-of-first-life. This is a static design parameter.
      DIN DKE Spec 99100 chapter reference: 6.7.2.4

  - id: powerFade
    label: power fade
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Allowable power fade threshold as percentage of rated power.
      This is a static design parameter.
      DIN DKE Spec 99100 chapter reference: 6.7.3.4

  - id: energyRoundTripEfficiencyFade
    label: energy round trip efficiency fade
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Allowable fade in round-trip energy efficiency as percentage of original rated
      efficiency. This is a static design parameter.
      DIN DKE Spec 99100 chapter reference: 6.7.4.5

  - id: internalResistanceIncrease
    label: internal resistance increase
    domain: bp:BatteryTechnicalProperties
    range: xsd:double
    comment: |
      Allowable increase in internal resistance as percentage of original internal
      resistance value. This is a static design parameter.
      DIN DKE Spec 99100 chapter reference: 6.7.5.3

  # -----------------------------------------------------------------------
  # InternalResistance properties
  # -----------------------------------------------------------------------
  - id: ohmicResistance
    label: ohmic resistance
    domain: bp:InternalResistance
    range: xsd:double
    comment: |
      Internal resistance value in ohms.

  - id: batteryComponent
    label: battery component
    domain: bp:InternalResistance
    range: bp:BatteryComponentDatatype
    comment: |
      Battery component level (pack, module, or cell).

  # -----------------------------------------------------------------------
  # TemperatureRangeType properties
  # -----------------------------------------------------------------------
  - id: minimum
    label: minimum
    domain: bp:TemperatureRangeType
    range: xsd:double
    comment: |
      Lower temperature boundary.

  - id: maximum
    label: maximum
    domain: bp:TemperatureRangeType
    range: xsd:double
    comment: |
      Upper temperature boundary.

  - id: temperatureConstraintType
    label: temperature constraint type
    domain: bp:TemperatureRangeType
    range: bp:TemperatureConstraintDatatype
    comment: |
      The use case for the temperature limit (StorageTemperature or ChargingTemperature).

  # -----------------------------------------------------------------------
  # BatteryCondition properties (dynamic)
  # -----------------------------------------------------------------------
  - id: stateOfCharge
    label: state of charge
    domain: bp:BatteryCondition
    range: bp:StateOfCharge
    comment: |
      Available capacity in a battery expressed as a percentage of remaining capacity.
      DIN DKE Spec 99100 chapter reference: 6.7.2.8

  - id: remainingCapacity
    label: remaining capacity
    domain: bp:BatteryCondition
    range: bp:RemainingCapacity
    comment: |
      In-use data attribute on capacity, corresponding with definition of rated capacity.
      DIN DKE Spec 99100 chapter reference: 6.7.2.3

  - id: remainingEnergy
    label: remaining energy
    domain: bp:BatteryCondition
    range: bp:RemainingEnergy
    comment: |
      Energy supplied by the battery from beginning of test procedure until
      break-off criterion is reached.
      DIN DKE Spec 99100 chapter reference: 6.7.2.6

  - id: stateOfCertifiedEnergy
    label: state of certified energy
    domain: bp:BatteryCondition
    range: bp:StateOfCertifiedEnergy
    comment: |
      Measured or on-board UBE performance as percentage of certified usable battery energy.
      DIN DKE Spec 99100 chapter reference: 6.7.2.7

  - id: remainingPowerCapability
    label: remaining power capability
    domain: bp:BatteryCondition
    range: bp:RemainingPowerCapability
    comment: |
      Remaining power capability with temperature range when relevant.
      DIN DKE Spec 99100 chapter reference: 6.7.3.3

  - id: roundTripEfficiencyat50PerCentCycleLife
    label: round trip efficiency at 50 percent cycle life
    domain: bp:BatteryCondition
    range: xsd:double
    comment: |
      Initial round trip energy efficiency measured at 50% of cycle-life.
      DIN DKE Spec 99100 chapter reference: 6.7.4.3

  - id: remainingRoundTripEnergyEfficiency
    label: remaining round trip energy efficiency
    domain: bp:BatteryCondition
    range: bp:RemainingRoundTripEnergyEfficiency
    comment: |
      Remaining round trip energy efficiency as state of health indicator.
      DIN DKE Spec 99100 chapter reference: 6.7.4.4

  - id: currentSelfDischargingRate
    label: current self discharging rate
    domain: bp:BatteryCondition
    range: bp:CurrentSelfDischargingRate
    comment: |
      Current self-discharge rate in idle state at reference conditions.
      DIN DKE Spec 99100 chapter reference: 6.7.4.7

  - id: evolutionOfSelfDischarge
    label: evolution of self discharge
    domain: bp:BatteryCondition
    range: bp:EvolutionOfSelfDischarge
    comment: |
      Change of self-discharge over time and usage.
      DIN DKE Spec 99100 chapter reference: 6.7.4.8

  - id: energyThroughput
    label: energy throughput
    domain: bp:BatteryCondition
    range: xsd:double
    comment: |
      Energy throughput measurement.
      DIN DKE Spec 99100 chapter reference: 6.7.6.7

  - id: capacityThroughput
    label: capacity throughput
    domain: bp:BatteryCondition
    range: bp:CapacityThroughput
    comment: |
      Capacity throughput measurement.
      DIN DKE Spec 99100 chapter reference: 6.7.6.8

  - id: numberOfFullCycles
    label: number of full cycles
    domain: bp:BatteryCondition
    range: bp:NumberOfFullCycles
    comment: |
      Number of (full) charging and discharging cycles.
      DIN DKE Spec 99100 chapter reference: 6.7.6.4

  - id: negativeEvents
    label: negative events
    domain: bp:BatteryCondition
    range: bp:NegativeEvent
    comment: |
      Information about negative events such as accidents.

  - id: temperatureInformation
    label: temperature information
    domain: bp:BatteryCondition
    range: bp:TemperatureConditions
    comment: |
      Periodically recorded information on operating environmental conditions
      including temperature. DIN DKE Spec 99100 chapter reference: 6.7.7.2

