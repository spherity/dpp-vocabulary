  # -----------------------------------------------------------------------
  # NumberOfFullCycles properties
  # -----------------------------------------------------------------------
  - id: numberOfFullCyclesValue
    label: number of full cycles value
    domain: bp:NumberOfFullCycles
    range: xsd:integer
    comment: |
      Number of full cycles value.

  # -----------------------------------------------------------------------
  # CapacityThroughput properties
  # -----------------------------------------------------------------------
  - id: capacityThroughputValue
    label: capacity throughput value
    domain: bp:CapacityThroughput
    range: xsd:double
    comment: |
      Capacity throughput value in ampere-hours.

  # -----------------------------------------------------------------------
  # NegativeEvent properties
  # -----------------------------------------------------------------------
  - id: numberOfDeepDischargeEvents
    label: number of deep discharge events
    domain: bp:NegativeEvent
    range: xsd:integer
    comment: |
      Number of deep discharge events recorded.
      DIN DKE Spec 99100 chapter reference: 6.7.7.9

  - id: numberOfOverchargeEvents
    label: number of overcharge events
    domain: bp:NegativeEvent
    range: xsd:integer
    comment: |
      Number of overcharge events recorded.
      DIN DKE Spec 99100 chapter reference: 6.7.7.10

  - id: informationOnAccidents
    label: information on accidents
    domain: bp:NegativeEvent
    range: xsd:anyURI
    comment: |
      URL to information on accidents or incidents related to the battery.
      DIN DKE Spec 99100 chapter reference: 6.7.7.11

  # -----------------------------------------------------------------------
  # TemperatureConditions properties
  # -----------------------------------------------------------------------
  - id: timeExtremeHighTemp
    label: time extreme high temp
    domain: bp:TemperatureConditions
    range: xsd:double
    comment: |
      Cumulated time spent above upper temperature boundary.

  - id: timeExtremeLowTemp
    label: time extreme low temp
    domain: bp:TemperatureConditions
    range: xsd:double
    comment: |
      Cumulated time spent below lower temperature boundary.

  - id: timeExtremeHighTempCharging
    label: time extreme high temp charging
    domain: bp:TemperatureConditions
    range: xsd:double
    comment: |
      Cumulated time spent above upper temperature boundary during charging.

  - id: timeExtremeLowTempCharging
    label: time extreme low temp charging
    domain: bp:TemperatureConditions
    range: xsd:double
    comment: |
