#######################################################################
# Battery Digital Product Passport Vocabulary
# Generated from: 2026_BatteryPass-Ready_DataAttributeLongList_v1.3.xlsx
#                 instructions.md
# Namespace: https://dpp.vocabulary.spherity.com/dbp/v0.2#
#######################################################################

vocab:
  - id: bp
    value: https://dpp.vocabulary.spherity.com/dbp/v0.2#

prefix:
  - id: xsd
    value: http://www.w3.org/2001/XMLSchema#
  - id: dc
    value: http://purl.org/dc/terms/
  - id: schema
    value: https://schema.org/

ontology:
  - property: dc:title
    value: Battery Digital Product Passport Vocabulary

  - property: dc:description
    value: |
      Combined Battery Digital Product Passport vocabulary covering all mandatory and optional
      data attributes required by REGULATION (EU) 2023/1542 (EU Battery Regulation) and
      DIN DKE Spec 99100. Modules included: Carbon Footprint, Circularity, General Information,
      Labels, Material Composition, Performance and Durability, Supply Chain Due Diligence.

  - property: rdfs:seeAlso
    value: https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:32023R1542

  - property: rdfs:seeAlso
    value: https://thebatterypass.eu/battery-pass/

class:
  # -----------------------------------------------------------------------
  # Module: General Information
  # -----------------------------------------------------------------------
  - id: GeneralInformation
    label: General Information
    comment: |
      General product information for battery passport including product identification,
      manufacturer information, manufacturing details, and battery category.
    see_also:
      - label: "REGULATION (EU) 2023/1542, Annex XIII"
        url: https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:32023R1542

  - id: DPPStaticMetadata
    label: DPP Static Metadata
    comment: |
      Static Digital Product Passport metadata as defined in JTC-24 prEN_18223.
      These attributes are set at issuance and describe the structure and granularity
      of the DPP record itself.
    see_also:
      - label: "DIN DKE Spec 99100"
        url: https://www.din.de/en/getting-involved/standards-committees/nid/european-projects/wdc-proj:din21:355350326

  - id: DPPStatus
    label: DPP Status
    comment: |
      Dynamic lifecycle state of the Digital Product Passport record.
      This attribute changes over the DPP lifecycle independently of the static product data.
    see_also:
      - label: "DIN DKE Spec 99100"
        url: https://www.din.de/en/getting-involved/standards-committees/nid/european-projects/wdc-proj:din21:355350326

  - id: DPPLastUpdated
    label: DPP Last Updated
    comment: |
      Dynamic timestamp recording when the Digital Product Passport record was most
      recently updated. Changes independently of static product data over the DPP lifecycle.
    see_also:
      - label: "DIN DKE Spec 99100"
        url: https://www.din.de/en/getting-involved/standards-committees/nid/european-projects/wdc-proj:din21:355350326

  - id: ContactInformation
    label: Contact Information
    comment: |
      Contact information including name, postal address, identifier,
      and optional email and web address.

  - id: PostalAddress
    label: Postal Address
    comment: |
      A postal address with country, postal code, street address,
      and optional facility identifier.
    see_also:
      - label: "schema:PostalAddress"
        url: https://schema.org/PostalAddress

  # -----------------------------------------------------------------------
  # Module: Labeling
  # -----------------------------------------------------------------------
  - id: Labeling
    label: Labeling
    comment: |
      Battery labeling information including declaration of conformity,
      test reports, labels, and extinguishing agent.
    see_also:
      - label: "REGULATION (EU) 2023/1542, Article 13"
        url: https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:32023R1542

  - id: Label
    label: Label
    comment: |
      Entity for the definition of required battery labeling including
      symbol, meaning, and subject.

  # -----------------------------------------------------------------------
  # Module: Carbon Footprint
  # -----------------------------------------------------------------------
  - id: CarbonFootprint
    label: Carbon Footprint
    comment: |
      The battery passport must contain carbon footprint per functional unit of the
      battery as declared in the battery carbon footprint declaration in accordance
      with the entry into force of the implementing acts on the format of declaration.
    see_also:
      - label: "REGULATION (EU) 2023/1542, Article 7"
        url: https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:32023R1542

  - id: CarbonFootprintPerLifecycleStage
    label: Carbon Footprint Per Lifecycle Stage
    comment: |
      The carbon footprint of the battery as share of total Battery Carbon Footprint,
      differentiated per life cycle stage: raw material acquisition, main production,
      distribution and end of life and recycling.

  # -----------------------------------------------------------------------
  # Module: Supply Chain Due Diligence
  # -----------------------------------------------------------------------
  - id: SupplyChainDueDiligence
    label: Supply Chain Due Diligence
    comment: |
      Battery supply chain due diligence information including responsible sourcing
      reports and third-party assurances.
    see_also:
      - label: "REGULATION (EU) 2023/1542, Article 48"
        url: https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:32023R1542

  # -----------------------------------------------------------------------
  # Module: Material Composition
  # -----------------------------------------------------------------------
  - id: MaterialComposition
    label: Material Composition
    comment: |
      Battery material composition including battery chemistry, battery materials,
      and hazardous substances.
    see_also:
      - label: "REGULATION (EU) 2023/1542, Article 11"
        url: https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:32023R1542

  - id: BatteryChemistry
    label: Battery Chemistry
    comment: |
      Detailed composition, including materials used in the cathode, anode,
      and electrolyte. All common cells have two electrodes and an electrolyte.
      The specific combination of materials used to make these components is called
      chemistry.

  - id: BatteryMaterial
    label: Battery Material
    comment: |
      Detailed composition, including materials used in the cathode, anode,
      and electrolyte.

  - id: BatteryLocation
    label: Battery Location
    comment: |
      Battery component that includes the material, identified by component name,
      identifier, and component type.

  - id: HazardousSubstance
    label: Hazardous Substance
    comment: |
      Hazardous substances contained in the battery other than mercury, cadmium or lead.
      Substance as a chemical element and its compounds in the natural state or the
      result of a manufacturing process.

  - id: HazardousSubstanceImpact
    label: Hazardous Substance Impact
    comment: |
      An environmental or health impact associated with a hazardous substance,
      described by an impact class and impact statement based on REACH or GHS
      for all hazard classes applicable to substances in the battery.

  # -----------------------------------------------------------------------
  # Module: Circularity
  # -----------------------------------------------------------------------
  - id: Circularity
    label: Circularity
    comment: |
      Battery circularity information including dismantling, spare parts,
      recycled content, safety measures, and end-of-life information.
    see_also:
      - label: "REGULATION (EU) 2023/1542, Article 77"
        url: https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:32023R1542

  - id: DismantlingDocument
    label: Dismantling Document
    comment: |
      Dismantling and Removal information, including at least: exploded diagrams
      of the battery system/pack showing the location of battery cells, disassembly
      sequences, type and number of fastening techniques to be unlocked, tools required
      for disassembly, warnings if risk of damaging parts exists, amount of cells used
      and layout.

  - id: SparePartSupplier
    label: Spare Part Supplier
    comment: |
      The part numbers for components should be provided together with the postal
      address, e-mail address and web address of the sources for spare parts.

  - id: Component
    label: Component
    comment: |
      Component information including part name and number.

  - id: RecycledContent
    label: Recycled Content
    comment: |
      A battery passport must include recycled content information. The content
      information must include the percentage share of materials that have been
      recovered from battery manufacturing waste, for each battery model per year
      and per manufacturing plant.

  - id: EndOfLifeInformation
    label: End Of Life Information
    comment: |
      Information on end-of-life handling, waste prevention, and collection.

  # -----------------------------------------------------------------------
  # Module: Performance and Durability
  # -----------------------------------------------------------------------
  - id: PerformanceAndDurability
    label: Performance And Durability
    comment: |
      Battery performance and durability information including technical properties
      and condition.
    see_also:
      - label: "REGULATION (EU) 2023/1542, Annex IV"
        url: https://eur-lex.europa.eu/legal-content/EN/TXT/PDF/?uri=CELEX:32023R1542

  - id: BatteryTechnicalProperties
    label: Battery Technical Properties
    comment: |
      Covers all capability related static data attributes including rated capacity,
      power, energy, voltage ranges, internal resistance, expected lifetime, and
      allowable degradation thresholds.

  - id: BatteryCondition
    label: Battery Condition
    comment: |
      Covers all battery lifetime relevant dynamic properties including energy throughput,
      number of cycles, state of charge, and temperature information.

  - id: PowerCapabilityAt
    label: Power Capability At
    comment: |
      Power capability measurement at a specific state of charge percentage.
      Used to characterise battery power output across its operating range.

  - id: InternalResistance
    label: Internal Resistance
    comment: |
      Internal resistance measurement for battery pack, module, or cell level.

  - id: TemperatureRangeType
    label: Temperature Range Type
    comment: |
      Temperature range with minimum and maximum boundaries.

  - id: StateOfCharge
    label: State Of Charge
    comment: |
      Available capacity in a battery expressed as a percentage of remaining capacity.
      DIN DKE Spec 99100 chapter reference: 6.7.2.8

  - id: RemainingCapacity
    label: Remaining Capacity
    comment: |
      In-use data attribute on capacity, corresponding with definition of rated capacity.
      DIN DKE Spec 99100 chapter reference: 6.7.2.3

  - id: RemainingEnergy
    label: Remaining Energy
    comment: |
      Energy supplied by the battery from beginning of test procedure until
      break-off criterion is reached. DIN DKE Spec 99100 chapter reference: 6.7.2.6

  - id: StateOfCertifiedEnergy
    label: State Of Certified Energy
    comment: |
      Measured or on-board UBE performance as percentage of certified usable battery energy.
      DIN DKE Spec 99100 chapter reference: 6.7.2.7

  - id: RemainingPowerCapability
    label: Remaining Power Capability
    comment: |
      Remaining power capability with temperature range when relevant.
      DIN DKE Spec 99100 chapter reference: 6.7.3.3

  - id: RemainingPowerCapabilityDynamicAt
    label: Remaining Power Capability Dynamic At
    comment: |
      Remaining power capability extending PowerCapabilityAt with a timestamp
      for dynamic reporting.

  - id: RemainingRoundTripEnergyEfficiency
    label: Remaining Round Trip Energy Efficiency
    comment: |
      Remaining round trip energy efficiency as state of health indicator.
      DIN DKE Spec 99100 chapter reference: 6.7.4.4

  - id: CurrentSelfDischargingRate
    label: Current Self Discharging Rate
    comment: |
      Current self-discharge rate in idle state at reference conditions.
      DIN DKE Spec 99100 chapter reference: 6.7.4.7

  - id: EvolutionOfSelfDischarge
    label: Evolution Of Self Discharge
    comment: |
      Change of self-discharge over time and usage.
      DIN DKE Spec 99100 chapter reference: 6.7.4.8

  - id: NumberOfFullCycles
    label: Number Of Full Cycles
    comment: |
      Number of (full) charging and discharging cycles.
      DIN DKE Spec 99100 chapter reference: 6.7.6.4

  - id: CapacityThroughput
    label: Capacity Throughput
    comment: |
      Capacity throughput value with last update timestamp.
      DIN DKE Spec 99100 chapter reference: 6.7.6.8

  - id: NegativeEvent
    label: Negative Event
    comment: |
      Information about negative events such as accidents, deep discharges,
      or overcharge events.

  - id: TemperatureConditions
    label: Temperature Conditions
    comment: |
      Periodically recorded information on operating environmental conditions
      including temperature. DIN DKE Spec 99100 chapter reference: 6.7.7.2

datatype:
  - id: BatteryCategoryDatatype
    label: Battery Category
    upper_value: xsd:string
    comment: |
      The category of the battery as defined by REGULATION (EU) 2023/1542.
    one_of:
      - LMT
      - EV
      - SLI
      - Stationary

  - id: BatteryComponentDatatype
    label: Battery Component
    upper_value: xsd:string
    comment: |
      Identifies a battery component level for measurements such as internal resistance.
    one_of:
      - Pack
      - Module
      - Cell

  - id: BatteryComponentTypeDatatype
    label: Battery Component Type
    upper_value: xsd:string
    comment: |
      Type classification of the battery component (e.g. Cathode, Anode, Electrolyte).
    one_of:
      - Cathode
      - Anode
      - Electrolyte
      - Cell
      - Module
      - Pack
      - Other

  - id: BatteryPassportIdentifierDatatype
    label: Battery Passport Identifier
    upper_value: xsd:string
    comment: |
      URN format identifier for battery passport.
    pattern: "^urn:[a-z0-9]+:[a-z0-9]+$"

  - id: BatteryStatusDatatype
    label: Battery Status
    upper_value: xsd:string
    comment: |
      Lifecycle status of the battery as defined in REGULATION (EU) 2023/1542.
    one_of:
      - Original
      - Repurposed
      - Reused
      - Remanufactured
      - Waste

  - id: CASNumberDatatype
    label: CAS Number
    upper_value: xsd:string
    comment: |
      Chemical Abstracts Service (CAS) Registry Number format.
    pattern: "^\\d{2,7}-\\d{2}-\\d{1}$"

  - id: CarbonFootprintPerformanceClassDatatype
    label: Carbon Footprint Performance Class
    upper_value: xsd:string
    comment: |
      The carbon footprint performance class of the battery as defined in
      REGULATION (EU) 2023/1542, ranging from A (lowest/best) to E (highest/worst).
    one_of:
      - A
      - B
      - C
      - D
      - E

  - id: DPPStatusDatatype
    label: DPP Status
    upper_value: xsd:string
    comment: |
      Lifecycle status of the Digital Product Passport.
    one_of:
      - Active
      - Archived
      - Inactive
      - Marked-for-deletion

  - id: DocumentTypeDatatype
    label: Document Type
    upper_value: xsd:string
    comment: |
      Enumeration of document types for dismantling and removal documentation.
    one_of:
      - BillOfMaterial
      - Model3D
      - DismantlingManual
      - RemovalManual
      - OtherManual
      - Drawing

  - id: EmailAddressDatatype
    label: Email Address
    upper_value: xsd:string
    comment: |
      Valid email address format.
    pattern: "^[\\w.-]+@[\\w.-]+\\.[A-Za-z]{2,}$"

  - id: HazardousSubstanceClassDatatype
    label: Hazardous Substance Class
    upper_value: xsd:string
    comment: |
      Enumeration of CLP hazard classes per Regulation (EC) No 1272/2008.
    one_of:
      - AcuteToxicity
      - SkinCorrosionOrIrritation
      - EyeDamageOrIrritation
      - RespiratoryOrSkinSensitisation
      - GermCellMutagenicity
      - Carcinogenicity
      - ReproductiveToxicity
      - SpecificTargetOrganToxicitySingleExposure
      - SpecificTargetOrganToxicityRepeatedExposure
      - AspirationHazard
      - AquaticToxicityAcute
      - AquaticToxicityChronic

  - id: LabelingSubjectDatatype
    label: Labeling Subject
    upper_value: xsd:string
    comment: |
      Short name of required labeling subjects as specified in REGULATION (EU) 2023/1542.
      Cadmium and Lead are listed as separate options.
    one_of:
      - SeparateCollection
      - Cadmium
      - Lead
      - CarbonFootprint
      - ExtinguishingAgent

  - id: LifecycleStageDatatype
    label: Lifecycle Stage
    upper_value: xsd:string
    comment: |
      Enumeration of battery lifecycle stages for carbon footprint attribution.
    one_of:
      - RawMaterialAcquisition
      - MainProduction
      - Distribution
      - Use
      - EndOfLifeAndRecycling

  - id: PercentageDatatype
    label: Percentage
    upper_value: xsd:double
    comment: |
      Percentage value between 0 and 100.

  - id: RecycledMaterialDatatype
    label: Recycled Material
    upper_value: xsd:string
    comment: |
      Name of recyclable material in recycled content reporting.
    one_of:
      - Cobalt
      - Nickel
      - Lithium
      - Lead

  - id: TemperatureConstraintDatatype
    label: Temperature Constraint
    upper_value: xsd:string
    comment: |
      Constraint type for battery temperature ranges, specifying the use case
      for the temperature limit.
    one_of:
      - StorageTemperature
      - ChargingTemperature

property:
  # -----------------------------------------------------------------------
  # GeneralInformation properties
  # -----------------------------------------------------------------------
  - id: batteryPassportIdentifier
    label: battery passport identifier
    domain: bp:GeneralInformation
    range: bp:BatteryPassportIdentifierDatatype
    comment: |
      Unique identifier allowing for the unambiguous identification of each individual
      battery and hence each corresponding battery passport.

  - id: productIdentifier
    label: product identifier
    domain: bp:GeneralInformation
    range: xsd:string
    comment: |
      Unique identifier allowing for the unambiguous identification of each individual
      battery and hence each corresponding battery passport.
      DIN DKE Spec chapter reference: 6.1.2.2

  - id: batteryModelIdentifier
    label: battery model identifier
    domain: bp:GeneralInformation
    range: xsd:string
    comment: |
      Unambiguous identification of the battery model.
      DIN DKE Spec chapter reference: 6.1.2.1

  - id: batterySerialNumber
    label: battery serial number
    domain: bp:GeneralInformation
    range: xsd:string
    comment: |
      Unique serial number of the individual battery item.
      DIN DKE Spec chapter reference: 6.1.2.2

  - id: batteryCategory
    label: battery category
    domain: bp:GeneralInformation
    range: bp:BatteryCategoryDatatype
    comment: |
      Categories relevant for the battery passport: LMT battery, electric vehicle battery,
      stationary or other industrial battery greater than 2 kWh.
      DIN DKE Spec chapter reference: 6.1.3.5

  - id: batteryMass
    label: battery mass
    domain: bp:GeneralInformation
    range: xsd:double
    comment: |
      Mass of the entire battery in kilograms.
      DIN DKE Spec chapter reference: 6.1.3.6

  - id: batteryStatus
    label: battery status
    domain: bp:GeneralInformation
    range: bp:BatteryStatusDatatype
    comment: |
      Lifecycle status of the battery. Status defined from a list: original, repurposed,
      reused, remanufactured, waste.
      DIN DKE Spec chapter reference: 6.1.3.7

  - id: manufacturingDate
    label: manufacturing date
    domain: bp:GeneralInformation
    range: xsd:gYearMonth
    comment: |
      The manufacturing date should not only relate to the battery model, but to the
      battery item. The date code should comply with DIN ISO 8601.
      DIN DKE Spec chapter reference: 6.1.3.2

  - id: puttingIntoService
    label: putting into service
    domain: bp:GeneralInformation
    range: xsd:gYearMonth
    comment: |
      The battery passport must include information on the date of putting the battery
      into service. DIN DKE Spec chapter reference: 6.1.3.3

  - id: warrantyPeriod
    label: warranty period
    domain: bp:GeneralInformation
    range: xsd:gYearMonth
    comment: |
      The battery passport must include information about the period for which the
      commercial warranty applies. DIN DKE Spec chapter reference: 6.1.3.4

  - id: manufacturerInformation
    label: manufacturer information
    domain: bp:GeneralInformation
    range: bp:ContactInformation
    comment: |
      Unambiguous identification of the manufacturer of the battery, suggested via
      a unique operator identifier. DIN DKE Spec chapter reference: 6.1.2.4

  - id: operatorInformation
    label: operator information
    domain: bp:GeneralInformation
    range: bp:ContactInformation
    comment: |
      State the name, trade name or mark, postal address, web address, e-mail address.
      DIN DKE Spec chapter reference: 6.1.2.3

  - id: manufacturerIdentifier
    label: manufacturer identifier
    domain: bp:GeneralInformation
    range: xsd:string
    comment: |
      Unique identifier of the manufacturer of the battery.
      DIN DKE Spec chapter reference: 6.1.2.4

  - id: economicOperatorIdentifier
    label: economic operator identifier
    domain: bp:GeneralInformation
    range: xsd:string
    comment: |
      Unique identifier of the economic operator responsible for placing the battery
      on the market. DIN DKE Spec chapter reference: 6.1.2.3

  - id: manufacturingPlace
    label: manufacturing place
    domain: bp:GeneralInformation
    range: bp:PostalAddress
    comment: |
      Unambiguous identification of the manufacturing facility.
      DIN DKE Spec chapter reference: 6.1.3.1

  # -----------------------------------------------------------------------
  # DPPStaticMetadata properties
  # -----------------------------------------------------------------------
  - id: dppSchemaVersion
    label: dpp schema version
    domain: bp:DPPStaticMetadata
    range: xsd:string
    comment: |
      Version of the DPP data schema in use, as defined in JTC-24 prEN_18223.

  - id: dppGranularity
    label: dpp granularity
    domain: bp:DPPStaticMetadata
    range: xsd:string
    comment: |
      Level of granularity at which the DPP is issued (e.g. model, batch, item),
      as defined in JTC-24 prEN_18223.

  # -----------------------------------------------------------------------
  # DPPStatus properties
  # -----------------------------------------------------------------------
  - id: dppStatus
    label: dpp status
    domain: bp:DPPStatus
    range: bp:DPPStatusDatatype
    comment: |
      Dynamic lifecycle state of the Digital Product Passport record.
      Changes independently of product data over the DPP lifecycle.

  # -----------------------------------------------------------------------
  # DPPLastUpdated properties
  # -----------------------------------------------------------------------
  - id: dppLastUpdated
    label: dpp last updated
    domain: bp:DPPLastUpdated
    range: xsd:dateTime
    comment: |
      Timestamp of the most recent update to the Digital Product Passport record.

  # -----------------------------------------------------------------------
  # ContactInformation properties
  # -----------------------------------------------------------------------
  - id: contactName
    label: contact name
    domain: bp:ContactInformation
    range: xsd:string
    comment: |
      Name of the contact or organisation. Used to represent the company name
      of manufacturer or operator.

  - id: identifier
    label: identifier
    domain: bp:ContactInformation
    range: xsd:string
    comment: |
      Economic operator code identifier.

  - id: emailAddress
    label: email address
    domain: bp:ContactInformation
    range: bp:EmailAddressDatatype
    comment: |
      Email address.

  - id: webAddress
    label: web address
    domain: bp:ContactInformation
    range: xsd:anyURI
    comment: |
      Web address.

  - id: postalAddress
    label: postal address
    domain: bp:ContactInformation
    range: bp:PostalAddress
    comment: |
      Postal address of the contact.

  # -----------------------------------------------------------------------
  # PostalAddress properties
  # -----------------------------------------------------------------------
  - id: addressCountry
    label: address country
    domain: bp:PostalAddress
    range: xsd:string
    comment: |
      The country. For example, Germany or DE.

  - id: postalCode
    label: postal code
    domain: bp:PostalAddress
    range: xsd:string
    comment: |
      The postal code. For example, DE-10719 or 10719.

  - id: streetAddress
    label: street address
    domain: bp:PostalAddress
    range: xsd:string
    comment: |
      The street address. For example, Street 1 or Hindenburgstr. 10.

  - id: facilityIdentifier
    label: facility identifier
    domain: bp:PostalAddress
    range: xsd:string
    comment: |
      Unique identifier of the manufacturing facility.
      DIN DKE Spec chapter reference: 6.1.3.1

  # -----------------------------------------------------------------------
  # Labeling properties
  # -----------------------------------------------------------------------
  - id: labels
    label: labels
    domain: bp:Labeling
    range: bp:Label
    comment: |
      Separate collection or WEEE label indicating that a product should not be
      discarded as unsorted waste but must be sent to separate collection facilities
      for recovery and recycling.
      DIN DKE Spec chapter reference: 6.2.2-6.2.5

  - id: declarationOfConformity
    label: declaration of conformity
    domain: bp:Labeling
    range: xsd:anyURI
    comment: |
      A battery passport must include the EU declaration of conformity.
      The EU declaration of conformity has the model structure set out in Annex IX.
      DIN DKE Spec chapter reference: 6.2.7

  - id: resultOfTestReport
    label: result of test report
    domain: bp:Labeling
    range: xsd:anyURI
    comment: |
      URL to a document that includes results of test reports proving compliance
      in the market conformity assessment procedure.
      DIN DKE Spec chapter reference: 6.2.8

  - id: extinguishingAgent
    label: extinguishing agent
    domain: bp:Labeling
    range: xsd:string
    comment: |
      Usable extinguishing agents referring to classes of extinguishers (A, B, C, D, K).
      DIN DKE Spec chapter reference: 6.2.5

  # -----------------------------------------------------------------------
  # Label properties
  # -----------------------------------------------------------------------
  - id: symbol
    label: symbol
    domain: bp:Label
    range: xsd:anyURI
    comment: |
      URL or path to the labeling symbol image.

  - id: meaning
    label: meaning
    domain: bp:Label
    range: xsd:string
    comment: |
      Explanation of the meaning of all symbols and labels (including separate
      collection; cadmium and lead; and carbon footprint and carbon footprint
      performance class symbols).

  - id: subject
    label: subject
    domain: bp:Label
    range: bp:LabelingSubjectDatatype
    comment: |
      Short name of required labeling subjects.

  # -----------------------------------------------------------------------
  # CarbonFootprint properties
  # -----------------------------------------------------------------------
  - id: batteryCarbonFootprint
    label: battery carbon footprint
    domain: bp:CarbonFootprint
    range: xsd:double
    comment: |
      The carbon footprint of the battery, calculated as kg of carbon dioxide equivalent
      per one kWh of the total energy provided by the battery over its expected service life,
      as declared in the Carbon Footprint Declaration.
      DIN DKE Spec 99100 chapter reference: 6.3.2

  - id: carbonFootprintPerformanceClass
    label: carbon footprint performance class
    domain: bp:CarbonFootprint
    range: bp:CarbonFootprintPerformanceClassDatatype
    comment: |
      The carbon footprint performance class that the relevant battery model per
      manufacturing plant corresponds to.
      DIN DKE Spec 99100 chapter reference: 6.3.7

  - id: carbonFootprintStudy
    label: carbon footprint study
    domain: bp:CarbonFootprint
    range: xsd:anyURI
    comment: |
      A web link to get access to a public version of the study supporting
      the carbon footprint values.
      DIN DKE Spec 99100 chapter reference: 6.3.8

  - id: absoluteCarbonFootprint
    label: absolute carbon footprint
    domain: bp:CarbonFootprint
    range: xsd:integer
    comment: |
      The battery carbon footprint in absolute terms, calculated as kilograms of
      carbon dioxide equivalent, without reference to the functional unit.
      DIN DKE Spec 99100 chapter reference: 6.3.10

  - id: carbonFootprintPerLifecycleStage
    label: carbon footprint per lifecycle stage
    domain: bp:CarbonFootprint
    range: bp:CarbonFootprintPerLifecycleStage
    comment: |
      The carbon footprint of the battery as share of total Battery Carbon Footprint,
      differentiated per life cycle stages raw material extraction, battery production,
      distribution and recycling.
      DIN DKE Spec 99100 chapter reference: 6.3.3-6.3.6

  # -----------------------------------------------------------------------
  # CarbonFootprintPerLifecycleStage properties
  # -----------------------------------------------------------------------
  - id: carbonFootprint
    label: carbon footprint
    domain: bp:CarbonFootprintPerLifecycleStage
    range: xsd:double
    comment: |
      Carbon footprint of the individual lifecycle stage.

  - id: lifecycleStage
    label: lifecycle stage
    domain: bp:CarbonFootprintPerLifecycleStage
    range: bp:LifecycleStageDatatype
    comment: |
      The description of the life cycle stage.

  # -----------------------------------------------------------------------
  # SupplyChainDueDiligence properties
  # -----------------------------------------------------------------------
  - id: supplyChainDueDiligenceReport
    label: supply chain due diligence report
    domain: bp:SupplyChainDueDiligence
    range: xsd:anyURI
    comment: |
      The battery passport must include information on responsible sourcing as indicated
      in the report on its due diligence policy. The report must provide data on: supply
      chain due diligence policy, risk management plan, summary report of third-party
      verification, and elaboration on access to information.
      DIN DKE Spec 99100 chapter reference: 6.4.2

  - id: thirdPartyAssurances
    label: third party assurances
    domain: bp:SupplyChainDueDiligence
    range: xsd:anyURI
    comment: |
      Information on third-party supply chain assurances such as certifications,
      of recognised supply chain schemes.
      DIN DKE Spec 99100 chapter reference: 6.4.3

  - id: supplyChainIndices
    label: supply chain indices
    domain: bp:SupplyChainDueDiligence
    range: xsd:string
    comment: |
      Supply chain indices to allow easy assessment for consumers on level of
      responsible sourcing. ESGE+ indices under development by the GBA (Global
      Battery Alliance), scoring and benchmarking sustainability performance.
      DIN DKE Spec 99100 chapter reference: 6.4.4

  # -----------------------------------------------------------------------
  # MaterialComposition properties
  # -----------------------------------------------------------------------
  - id: batteryChemistry
    label: battery chemistry
    domain: bp:MaterialComposition
    range: bp:BatteryChemistry
    comment: |
      Composition of a product in general terms by specifying the cathode and anode
      active material as well as electrolyte.
      DIN DKE Spec 99100 chapter reference: 6.5.2

  - id: batteryMaterials
    label: battery materials
    domain: bp:MaterialComposition
    range: bp:BatteryMaterial
    comment: |
      Component materials used: Naming the materials (as a composition of substances)
      in cathode, anode, electrolyte according to public standards.
      DIN DKE Spec 99100 chapter reference: 6.5.3-6.5.4

  - id: hazardousSubstances
    label: hazardous substances
    domain: bp:MaterialComposition
    range: bp:HazardousSubstance
    comment: |
      Hazardous substances: Name all hazardous substance (as any substance that poses
      a threat to human health and the environment).
      DIN DKE Spec 99100 chapter reference: 6.5.4-6.5.6

  # -----------------------------------------------------------------------
  # BatteryChemistry properties
  # -----------------------------------------------------------------------
  - id: shortName
    label: short name
    domain: bp:BatteryChemistry
    range: xsd:string
    comment: |
      Short name of battery chemistry.

  - id: clearName
    label: clear name
    domain: bp:BatteryChemistry
    range: xsd:string
    comment: |
      Clear name of battery chemistry.

  # -----------------------------------------------------------------------
  # BatteryMaterial properties
  # -----------------------------------------------------------------------
  - id: batteryMaterialName
    label: battery material name
    domain: bp:BatteryMaterial
    range: xsd:string
    comment: |
      Clear name of material.

  - id: batteryMaterialIdentifier
    label: battery material identifier
    domain: bp:BatteryMaterial
    range: bp:CASNumberDatatype
    comment: |
      CAS Number identifying the battery material.

  - id: batteryMaterialMass
    label: battery material mass
    domain: bp:BatteryMaterial
    range: xsd:double
    comment: |
      Weight of component material in grams.

  - id: isCriticalRawMaterial
    label: is critical raw material
    domain: bp:BatteryMaterial
    range: xsd:boolean
    comment: |
      The battery passport must contain information on the critical raw materials present
      in the battery. Critical raw materials must be reported if present in the battery
      in a concentration of more than 0.1% weight by weight.

  - id: batteryMaterialLocation
    label: battery material location
    domain: bp:BatteryMaterial
    range: bp:BatteryLocation
    comment: |
      Battery component that relates to the material.

  # -----------------------------------------------------------------------
  # BatteryLocation properties
  # -----------------------------------------------------------------------
  - id: componentName
    label: component name
    domain: bp:BatteryLocation
    range: xsd:string
    comment: |
      Name of battery component.

  - id: componentId
    label: component id
    domain: bp:BatteryLocation
    range: xsd:string
    comment: |
      Identifier of substance component.

  - id: componentType
    label: component type
    domain: bp:BatteryLocation
    range: bp:BatteryComponentTypeDatatype
    comment: |
      Type classification of the battery component
      (e.g. Cathode, Anode, Electrolyte, Cell, Module, Pack).

  # -----------------------------------------------------------------------
  # HazardousSubstance properties
  # -----------------------------------------------------------------------
  - id: hazardousSubstanceName
    label: hazardous substance name
    domain: bp:HazardousSubstance
    range: xsd:string
    comment: |
      Clear name of hazardous substance.

  - id: hazardousSubstanceIdentifier
    label: hazardous substance identifier
    domain: bp:HazardousSubstance
    range: bp:CASNumberDatatype
    comment: |
      CAS identifier of hazardous substance.

  - id: hazardousSubstanceConcentration
    label: hazardous substance concentration
    domain: bp:HazardousSubstance
    range: xsd:double
    comment: |
      Concentration of hazardous substance in percent.

  - id: hazardousSubstanceLocation
    label: hazardous substance location
    domain: bp:HazardousSubstance
    range: bp:BatteryLocation
    comment: |
      Location on a (sub-)component-level of all hazardous substances.

  - id: hazardousSubstanceClass
    label: hazardous substance class
    domain: bp:HazardousSubstance
    range: bp:HazardousSubstanceClassDatatype
    comment: |
      Battery Regulation narrows reporting to substances falling under defined
      hazard classes and categories of the CLP regulation.

  - id: hazardousSubstanceImpacts
    label: hazardous substance impacts
    domain: bp:HazardousSubstance
    range: bp:HazardousSubstanceImpact
    comment: |
      Impact statements based on, e.g., REACH or GHS for all hazard classes
      applicable to substances in the battery.

  # -----------------------------------------------------------------------
  # HazardousSubstanceImpact properties
  # -----------------------------------------------------------------------
  - id: impactClass
    label: impact class
    domain: bp:HazardousSubstanceImpact
    range: xsd:string
    comment: |
      The class or category of the environmental or health impact.

  - id: impactStatement
    label: impact statement
    domain: bp:HazardousSubstanceImpact
    range: xsd:string
    comment: |
      A descriptive statement of the environmental or health impact of
      the hazardous substance.

  # -----------------------------------------------------------------------
  # Circularity properties
  # -----------------------------------------------------------------------
  - id: dismantlingDocuments
    label: dismantling documents
    domain: bp:Circularity
    range: bp:DismantlingDocument
    comment: |
      Dismantling and Removal information.
      DIN DKE Spec 99100 chapter reference: 6.6.1.2

  - id: sparePartSources
    label: spare part sources
    domain: bp:Circularity
    range: bp:SparePartSupplier
    comment: |
      Contact details of sources for replacement spares.
      DIN DKE Spec 99100 chapter reference: 6.6.1.3-6.6.1.4

  - id: recycledContent
    label: recycled content
    domain: bp:Circularity
    range: bp:RecycledContent
    comment: |
      Share of material recovered from waste present in active materials for each
      battery model per year and per manufacturing plant.
      DIN DKE Spec 99100 chapter reference: 6.6.2.3-6.6.2.10

  - id: safetyMeasures
    label: safety measures
    domain: bp:Circularity
    range: xsd:anyURI
    comment: |
      Safety measures and necessary safety instructions to handle waste batteries,
      including in relation to the risks associated with, and the handling of,
      batteries containing lithium.
      DIN DKE Spec 99100 chapter reference: 6.6.1.5

  - id: endOfLifeInformation
    label: end of life information
    domain: bp:Circularity
    range: bp:EndOfLifeInformation
    comment: |
      Producer or producer responsibility organisations shall make information available
      to distributors and end-users on the role of end-users in contributing to waste
      prevention. DIN DKE Spec 99100 chapter reference: 6.6.3.2-6.6.3.4

  - id: renewableContent
    label: renewable content
    domain: bp:Circularity
    range: xsd:double
    comment: |
      Share of renewable material content. A renewable material is a material made
      of natural resources that can be replenished.
      DIN DKE Spec 99100 chapter reference: 6.6.2.11

  # -----------------------------------------------------------------------
  # DismantlingDocument properties
  # -----------------------------------------------------------------------
  - id: documentType
    label: document type
    domain: bp:DismantlingDocument
    range: bp:DocumentTypeDatatype
    comment: |
      Describes type for document e.g. Dismantling manual.

  - id: mimeType
    label: mime type
    domain: bp:DismantlingDocument
    range: xsd:string
    comment: |
      Defines internet media type to determine how to interpret the documentURL.

  - id: documentURL
    label: document URL
    domain: bp:DismantlingDocument
    range: xsd:anyURI
    comment: |
      Link to document.

  # -----------------------------------------------------------------------
  # SparePartSupplier properties
  # -----------------------------------------------------------------------
  - id: nameOfSupplier
